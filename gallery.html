<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gallery | Flow Master Plumbing Solutions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="assets/css/style.css">

    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

</head>

<body>

    <div id="loader">

<div class="loader-content">

<h1 id="heroTitle">FLOW MASTER</h1>

<p id="heroSubtitle">Professional Plumbing Solutions</p>

<div class="spinner-border text-primary"></div>

</div>

</div>

<!-- Navbar -->

<div id="navbar"></div>

<section class="page-hero">

    <div class="container text-center">

        <h1>Project Gallery</h1>

        <p>Browse our completed plumbing projects and installations.</p>

    </div>

</section>

<section class="gallery-page py-5">

    <div class="container">

        <!-- Filters -->

        <div class="text-center mb-5">

            <button class="btn btn-primary filter-btn active" data-filter="all">All</button>

            <button class="btn btn-outline-primary filter-btn" data-filter="Bathroom">Bathroom</button>

            <button class="btn btn-outline-primary filter-btn" data-filter="Kitchen">Kitchen</button>

            <button class="btn btn-outline-primary filter-btn" data-filter="Commercial">Commercial</button>

            <button class="btn btn-outline-primary filter-btn" data-filter="Repairs">Repairs</button>

        </div>

<div class="row g-4" id="galleryContainer"></div>

    </div>

</section>

<!-- Image Modal -->

<div class="modal fade" id="galleryModal" tabindex="-1">

    <div class="modal-dialog modal-xl modal-dialog-centered">

        <div class="modal-content bg-dark">

            <div class="modal-body p-0">

                <img id="modalImage" class="img-fluid w-100" alt="Gallery Image">

            </div>

        </div>

    </div>

</div>


<!-- Floating Buttons -->

<div class="floating-buttons">

    <a href="tel:+2349012709720" class="call-btn">
        <i class="fas fa-phone"></i>
    </a>

    <a href="https://wa.me/2349012709720"
       target="_blank"
       class="whatsapp-btn">

        <i class="fab fa-whatsapp"></i>

    </a>

    <button id="topBtn">

        <i class="fas fa-arrow-up"></i>

    </button>

</div>

<!-- Lightbox -->

<div id="lightbox" class="lightbox">

    <span class="close-lightbox">&times;</span>

    <img id="lightboxImage">

    <button id="prevBtn">&#10094;</button>

    <button id="nextBtn">&#10095;</button>

</div>

<div id="footer"></div>

<script type="module" src="assets/js/gallery.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/main.js"></script>

<script src="assets/js/layout.js"></script>

<script type="module" src="assets/js/site-settings.js"></script>

<script src="assets/js/counter.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({
    duration:1000,
    once:true,
    offset:100
});
</script>

</body>

</html>
