<body>

    <div id="loader">

<div class="loader-content">

</div>

<form id="bookingForm">

    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" id="customerName" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" id="phone" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Service Needed</label>
        <select id="service" class="form-select" required>
            <option value="">Choose a service</option>
            <option>Pipe Installation</option>
            <option>Leak Repair</option>
            <option>Drain Cleaning</option>
            <option>Bathroom Plumbing</option>
            <option>Kitchen Plumbing</option>
            <option>Water Heater Installation</option>
            <option>Emergency Plumbing</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Service Address</label>
        <input type="text" id="address" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Preferred Date</label>
        <input type="date" id="preferredDate" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Additional Details</label>
        <textarea id="message" class="form-control" rows="4"></textarea>
    </div>

    <button class="btn btn-primary w-100" type="submit">
        Book Service
    </button>

</form>

<script type="module" src="assets/js/booking.js"></script>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/main.js"></script>

<script src="assets/js/layout.js"></script>

<script type="module" src="assets/js/site-settings.js"></script>

<script src="assets/js/counter.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({
    duration:1000,
    once:true,
    offset:100
});
</script>

</body>

</html>
