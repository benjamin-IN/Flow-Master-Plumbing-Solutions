<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard | Flow Master Plumbing</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Admin CSS -->
    <link rel="stylesheet" href="assets/css/admin.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

    <!-- Sidebar -->
    <div class="col-lg-2 bg-dark text-white min-vh-100 p-4">

        <h3 class="mb-4">Flow Master</h3>

        <ul class="nav flex-column">

            <li class="nav-item mb-3">
                <a href="index.html" class="nav-link text-white">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
            </li>

            <li class="nav-item mb-3">
                <a href="products.html" class="nav-link text-white">
                    <i class="fas fa-box"></i> Products
                </a>
            </li>

            <li class="nav-item mb-3">
                <a href="portfolio.html" class="nav-link text-white">
                    <i class="fas fa-briefcase"></i> Portfolio
                </a>
            </li>

            <li class="nav-item mb-3">
                <a href="gallery.html" class="nav-link text-white">
                    <i class="fas fa-images"></i> Gallery
                </a>
            </li>

            <li class="nav-item mb-3">
                <a href="bookings.html" class="nav-link text-white">
                    <i class="fas fa-calendar-check"></i> Bookings
                </a>
            </li>

            <li class="nav-item mb-3">
                <a href="quotes.html" class="nav-link text-white">
                    <i class="fas fa-file-invoice"></i> Quotes
                </a>
            </li>

            <li class="nav-item mb-3">
                <a href="contacts.html" class="nav-link text-white">
                    <i class="fas fa-envelope"></i> Messages
                </a>
            </li>

            <li class="nav-item mb-3">
                <a href="settings.html" class="nav-link text-white">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </li>

        </ul>

        <hr>

        <button id="logoutBtn" class="btn btn-danger w-100">
            <i class="fas fa-right-from-bracket"></i> Logout
        </button>

    </div>

    <!-- Main Content -->
   <div class="container-fluid">

    <h2 class="mb-4">Website Settings</h2>

    <form id="settingsForm">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Company Name</label>
                <input type="text" id="companyName" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Phone Number</label>
                <input type="text" id="phone" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>WhatsApp Number</label>
                <input type="text" id="whatsapp" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Business Address</label>
                <input type="text" id="address" class="form-control">
            </div>

                        <div class="col-12 mb-3">
                <label>WhatsApp URL</label>
                <input type="text" id="whatsappLink" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Facebook URL</label>
                <input type="text" id="facebookLink" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Instagram URL</label>
                <input type="text" id="instagramLink" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>YouTube URL</label>
                <input type="text" id="youtubeLink" class="form-control">
            </div>

                        <div class="col-md-6 mb-3">
                <label>X (Twitter) URL</label>
                <input type="text" id="twitterLink" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>LinkedIn URL</label>
                <input type="text" id="linkedinLink" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>TikTok URL</label>
                <input type="text" id="tiktokLink" class="form-control">
            </div>

            <div class="col-12 mb-3">
                <label>Hero Title</label>
                <input type="text" id="heroTitle" class="form-control">
            </div>

            <div class="col-12 mb-3">
                <label>Hero Subtitle</label>
                <textarea id="heroSubtitle" class="form-control" rows="3"></textarea>
            </div>

            <div class="col-12 mb-3">
                <label>Footer Text</label>
                <input type="text" id="footerText" class="form-control">
            </div>

        </div>

        <button class="btn btn-primary" type="submit">
            Save Settings
        </button>

    </form>

</div>

</div>

</div>

<script type="module" src="assets/js/checkAuth.js"></script>
<script type="module" src="assets/js/logout.js"></script>
<script type="module" src="assets/js/settings.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
