<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin - Products | Flow Master</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Admin CSS -->
    <link rel="stylesheet" href="assets/css/admin.css">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">

            <h3>Flow Master</h3>

            <span>Admin Panel</span>

        </div>

        <ul>

            <li><a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>

            <li class="active"><a href="products.html"><i class="fas fa-box"></i> Products</a></li>

            <li><a href="portfolio.html"><i class="fas fa-briefcase"></i> Portfolio</a></li>

            <li><a href="gallery.html"><i class="fas fa-images"></i> Gallery</a></li>

            <li><a href="quotes.html"><i class="fas fa-file-signature"></i> Quotes</a></li>

            <li><a href="bookings.html"><i class="fas fa-calendar-check"></i> Bookings</a></li>

            <li><a href="contacts.html"><i class="fas fa-envelope"></i> Messages</a></li>

            <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>

            <li><a href="login.html"><i class="fas fa-right-from-bracket"></i> Logout</a></li>

        </ul>

    </aside>

<div class="container mt-4">

    <h2 class="mb-4">Booking Details</h2>

    <div class="card">

        <div class="card-body">

            <p><strong>Customer:</strong> <span id="customerName"></span></p>

            <p><strong>Email:</strong> <span id="email"></span></p>

            <p><strong>Phone:</strong> <span id="phone"></span></p>

            <p><strong>Service:</strong> <span id="service"></span></p>

            <p><strong>Address:</strong> <span id="address"></span></p>

            <p><strong>Preferred Date:</strong> <span id="preferredDate"></span></p>

            <p><strong>Message:</strong></p>

            <p id="message" class="border rounded p-3 bg-light"></p>

            <div class="mb-3">

                <label class="form-label"><strong>Status</strong></label>

                <select id="status" class="form-select">

                    <option>Pending</option>
                    <option>Confirmed</option>
                    <option>Completed</option>
                    <option>Cancelled</option>

                </select>

            </div>

            <button id="saveBtn" class="btn btn-success">
                Save Changes
            </button>

        </div>

    </div>

</div>


</div>

<script type="module" src="assets/js/checkAuth.js"></script>
<script type="module" src="assets/js/booking-details.js"></script>

</body>

</html>
