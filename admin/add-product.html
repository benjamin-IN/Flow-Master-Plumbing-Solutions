<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | Flow Master Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="assets/css/admin.css">
</head>

<body>

<div class="container-fluid">

<div class="row">

    <!-- Sidebar -->
    <div class="col-lg-2 bg-dark text-white min-vh-100 p-4">

        <h3 class="mb-4">Flow Master</h3>

        <ul class="nav flex-column">

            <li class="nav-item mb-3">
                <a href="index.html" class="nav-link text-white">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
            </li>

            <li class="nav-item mb-3">
                <a href="products.html" class="nav-link text-white">
                    <i class="fas fa-box"></i> Products
                </a>
            </li>

        </ul>

    </div>

    <!-- Main Content -->
    <div class="col-lg-10 p-5">

        <h2>Add New Product</h2>

        <p class="text-muted">
            Create a new product for your website.
        </p>

        <div class="card shadow mt-4">

            <div class="card-body">

                <form id="productForm">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Product Name
                            </label>

                            <input
                                type="text"
                                id="productName"
                                class="form-control"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <select
                                id="category"
                                class="form-select"
                                required>

                                <option value="">
                                    Select Category
                                </option>

                                <option value="Pipes">
                                    Pipes
                                </option>

                                <option value="Fittings">
                                    Fittings
                                </option>

                                <option value="Valves">
                                    Valves
                                </option>

                                <option value="Tools">
                                    Tools
                                </option>

                            </select>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Brand
                            </label>

                            <input
                                type="text"
                                id="brand"
                                class="form-control"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Price
                            </label>

                            <input
                                type="number"
                                id="price"
                                class="form-control"
                                required>

                        </div>

                    </div>

                        <div class="mb-3">
                            <label class="form-label">Product Image</label>

                            <input
                                type="file"
                                id="imageFile"
                                class="form-control"
                                accept="image/*">

                            <img
                                id="previewImage"
                                class="img-fluid mt-3 rounded d-none"
                                style="max-width:200px;">
                        </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea
                            id="description"
                            class="form-control"
                            rows="5"
                            required></textarea>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Status
                        </label>

                        <select
                            id="status"
                            class="form-select">

                            <option value="Active">
                                Active
                            </option>

                            <option value="Inactive">
                                Inactive
                            </option>

                        </select>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Save Product

                    </button>

                    <a
                        href="products.html"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

<div
    id="toastContainer"
    class="toast-container position-fixed top-0 end-0 p-3">
</div>

<script type="module" src="assets/js/checkAuth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/add-product.js"></script>

</body>
</html>
